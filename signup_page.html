<!DOCTYPE html>
<html>
<head>
    <title>Signup</title>

    <style>
        body {
            background-color: lightblue;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .signup-box {
            width: 250px;
            padding: 20px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 5px 5px 10px gray;
            text-align: center;
        }

        input {
            width: 200px;
            height: 25px;
            margin: 5px;
        }

        button {
            background-color: blue;
            color: white;
            width: 100px;
            height: 35px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: darkblue;
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="signup-box">

            <h1>Create Account</h1>

            <input type="text" placeholder="Name">

            <br><br>

            <input type="email" placeholder="Email">

            <br><br>

            <input type="password" placeholder="Password">

            <br><br>

            <button>Signup</button>

        </div>

    </div>

</body>
</html>
